# Regularly update the minimum version of astropy-iers-data in pyproject.toml,
# to ensure that if users update astropy, astropy-iers-data will also get
# updated to a recent version.

name: Auto-update astropy-iers-data minimum version

on:
  schedule:
    - cron: '0 0 2 * *'  # Monthly
  workflow_dispatch:

permissions:
  contents: read

jobs:

  update-astropy-iers-data-pin:
    permissions:
      contents: write  # to create a branch
      pull-requests: write  # to create a PR
    name: Auto-update astropy-iers-data minimum version
    runs-on: ubuntu-latest
    if: github.repository == 'astropy/astropy'
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Set up uv
      uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

    # we take advantage of uv add's ability to set a lower bound on a new dependency
    # by first removing it (simulating astropy-iers-data being "new") and re-adding it.
    # --bounds=lower is passed in order to make the default behavior extra explicit
    - name: upgrade astropy-iers-data
      run: |
        uv remove astropy-iers-data --no-sync
        uv add astropy-iers-data --no-sync --bounds=lower
        uv run scripts/check-lowest-resolved-tree.py --overwrite

    - name: Commit changes
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git switch -c update-astropy-iers-data-pin-$(date +"%s")
        git add pyproject.toml scripts/lowest-resolved-tree.txt
        if ! git diff --cached --exit-code; then
          git commit -m "Update minimum required version of astropy-iers-data"
        fi

    - name: Create Pull Request
      run: |
        gh pr create \
          --title "Update minimum required version of astropy-iers-data" \
          --label no-changelog-entry-needed --label utils.iers \
          --template .github/workflows/update_astropy_iers_data_pin.md
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
