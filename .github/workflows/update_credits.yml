# Regularly update the credits.rst file, to reduce maintenance burden at the time
# of release. This will allow issues with the .mailmap issues to be spotted early.

name: Auto-update credits

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly
  workflow_dispatch:

permissions:
  contents: read

jobs:

  update-credits:
    permissions:
      contents: write  # to create a branch
      pull-requests: write  # to create a PR
    name: Auto-update credits
    runs-on: ubuntu-latest
    if: github.repository == 'astropy/astropy'
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: true  # needed for git push
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
      with:
        python-version: 3.x
    - name: Run update script
      run: pipx run scripts/update-credits.py
    - name: Commit changes
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        BRANCH_NAME=update-credits-$(date +"%s")
        git switch -c "$BRANCH_NAME"
        git add docs/credits.rst
        if ! git diff --cached --exit-code; then
          git commit -m "Update docs/credits.rst with new contributors"
        fi
        git push --set-upstream origin "$BRANCH_NAME"
    - name: Create Pull Request
      run: |
        gh pr create \
          --title "Update credits to add new contributors" \
          --label no-changelog-entry-needed --label Docs \
          --body-file .github/workflows/update_credits.md
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
